[flake8]
max-line-length = 120
exclude =
    .git,
    __pycache__,
    venv,
    yolox-consumer/yolox,
    yolox-consumer/.mypy_cache,
    .mypy_cache,
    build,
    dist,
    yolox-consumer/exps

ignore =
    Q000,
    D100,
    D101,
    D102,
    D103,
    D104,
    D107,
    D205,
    D400,
    D401

[isort]
profile = black
known_first_party = database,yolox
line_length = 100