name: Security Checks

on:
  workflow_call:
    inputs:
      service:
        required: true
        type: string
      runtime:
        required: true
        type: string

jobs:
  security:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.service }}

    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Filesystem scan (Trivy)
      - name: Filesystem scan (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: ${{ inputs.service }}
          severity: HIGH,CRITICAL
          exit-code: 0 

      # Secret scan
      - name: Secret scan (Gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Dependency scan: Node
      - name: Set up Node.js
        if: inputs.runtime == 'node'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: ${{ inputs.service }}/package-lock.json

      - name: Install Node dependencies
        if: inputs.runtime == 'node'
        run: npm ci

      - name: Dependency scan (npm audit)
        if: inputs.runtime == 'node'
        run: npm audit --audit-level=critical

      # Dependency scan: Python 
      - name: Set up Python
        if: inputs.runtime == 'python'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Dependency scan (pip-audit)
        if: inputs.runtime == 'python'
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt