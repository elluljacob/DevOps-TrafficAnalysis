name: Build and Push Services to GHCR

on:
  push:
    branches:
      - main
    paths:
      - 'dashboard/**'
      - 'stream-processor/**'
      - 'yolox-service/**'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      dashboard: ${{ steps.filter.outputs.dashboard }}
      stream_processor: ${{ steps.filter.outputs.stream_processor }}
      yolox_service: ${{ steps.filter.outputs.yolox_service }}
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4
      - name: Check for file changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            dashboard: 'dashboard/**'
            stream_processor: 'stream-processor/**'
            yolox_service: 'yolox-service/**'

  # ── Stage 1: Quality ────────────────────────────────────────────

  quality-dashboard:
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.dashboard == 'true' || github.event_name == 'workflow_dispatch' }}
    uses: ./.github/workflows/run-quality.yml
    with:
      service: dashboard
      runtime: node

  # quality-stream-processor:
  #   needs: detect-changes
  #   if: ${{ needs.detect-changes.outputs.stream_processor == 'true' || github.event_name == 'workflow_dispatch' }}
  #   uses: ./.github/workflows/run-quality.yml
  #   with:
  #     service: stream-processor
  #     runtime: python

  # quality-yolox-service:
  #   needs: detect-changes
  #   if: ${{ needs.detect-changes.outputs.yolox_service == 'true' || github.event_name == 'workflow_dispatch' }}
  #   uses: ./.github/workflows/run-quality.yml
  #   with:
  #     service: yolox-service
  #     runtime: python

  # ── Stage 2: Security ───────────────────────────────────────────

  security-dashboard:
    needs: [detect-changes, quality-dashboard]
    if: ${{ needs.detect-changes.outputs.dashboard == 'true' || github.event_name == 'workflow_dispatch' }}
    uses: ./.github/workflows/run-security.yml
    with:
      service: dashboard
      runtime: node

  # security-stream-processor:
  #   needs: [detect-changes, quality-stream-processor]
  #   if: ${{ needs.detect-changes.outputs.stream_processor == 'true' || github.event_name == 'workflow_dispatch' }}
  #   uses: ./.github/workflows/run-security.yml
  #   with:
  #     service: stream-processor
  #     runtime: python

  # security-yolox-service:
  #   needs: [detect-changes, quality-yolox-service]
  #   if: ${{ needs.detect-changes.outputs.yolox_service == 'true' || github.event_name == 'workflow_dispatch' }}
  #   uses: ./.github/workflows/run-security.yml
  #   with:
  #     service: yolox-service
  #     runtime: python

  # ── Stage 3: Build & Push (includes container scan) ─────────────

  build-dashboard:
    needs: [detect-changes, security-dashboard]
    if: ${{ needs.detect-changes.outputs.dashboard == 'true' || github.event_name == 'workflow_dispatch' }}
    uses: ./.github/workflows/docker-build.yml
    with:
      image_name: dashboard
      build_context: ./dashboard

  build-stream-processor:
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.stream_processor == 'true' || github.event_name == 'workflow_dispatch' }}
    uses: ./.github/workflows/docker-build.yml
    with:
      image_name: stream-processor
      build_context: ./stream-processor

  build-yolox-service:
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.yolox_service == 'true' || github.event_name == 'workflow_dispatch' }}
    uses: ./.github/workflows/docker-build.yml
    with:
      image_name: yolox-service
      build_context: ./yolox-service/yolox-consumer