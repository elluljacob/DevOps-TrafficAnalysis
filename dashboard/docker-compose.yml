services:
  app:
    container_name: dashboard-container
    build: .
    ports:
      - "3000:3000"
    environment:

      - DYNAMODB_ENDPOINT=https://dynamodb.eu-north-1.amazonaws.com
      - AWS_REGION=eu-north-1
      - DYNAMO_TABLE_NAME=Traffic-Metrics

      - USE_MOCK_DATA=false # Defaults to true if not set
    volumes:
      - .:/app
      - /app/node_modules
      - ./logs:/app/logs
