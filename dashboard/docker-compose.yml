services:
  app:
    container_name: dashboard-container
    build: .
    ports:
      - "3000:3000"
    environment:
      - LOG_TO_FILE=false
      - USE_MOCK_DATA=false
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
    volumes:
      - ./logs:/app/logs
