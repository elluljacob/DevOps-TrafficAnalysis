services:
  app:
    container_name: dashboard-container
    build:
      context: .
      target: deps
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=development
    volumes:
      - .:/app
      - /app/node_modules/
      - /app/.next/
    command: npm run dev